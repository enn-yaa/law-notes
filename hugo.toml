baseURL = "https://law.xuufaa.com/"
languageCode = "zh-cn"
title = "xuufaa· 博客"
theme = "PaperMod"

enableRobotsTXT = true
hasCJKLanguage = true

[pagination]
pagerSize = 10

[params]
defaultTheme = "auto"
disableThemeToggle = false

ShowReadingTime = true
ShowBreadCrumbs = true
ShowPostNavLinks = true
ShowToc = true

comments = false
ShowShareButtons = false
ShowCodeCopyButtons = true

homeFullContent = false
ShowAllPostsOnHome = true
ShowPostSummary = true

[params.homeInfoParams]
Title = "📚 最近更新的博客"
Content = "以下为最近更新的博客内容，涵盖民法、刑法、诉讼法、商经知、理论法等主要模块。"

[params.assets]
favicon = "favicon.ico"

[outputs]
home = ["HTML", "RSS", "JSON"]
page = ["HTML"]

[markup]
[markup.highlight]
style = "dracula"

[markup.goldmark.renderer]
unsafe = true

