baseURL = "https://law.xuufaa.com/"
languageCode = "zh-cn"
title = "xuufaa · 法考笔记"
theme = "PaperMod"

enableRobotsTXT = true
hasCJKLanguage = true


[pagination]
pagerSize = 10


[params]
defaultTheme = "auto"
disableThemeToggle = false
themeColor = "blue"

ShowReadingTime = true
ShowBreadCrumbs = true
ShowPostNavLinks = true
ShowToc = true

comments = false
ShowShareButtons = false
ShowCodeCopyButtons = true

homeFullContent = false
ShowAllPostsOnHome = true
ShowPostSummary = true


[params.homeInfoParams]
Title = "**📚 xuufaa 博客**"

Content = """
专注于法律职业资格考试学习资料整理。

涵盖：
民法、刑法、行政法、
民诉法、刑诉法、商经知、
理论法与国际法。

持续更新：
历年真题解析、重点法条、
思维导图与学习笔记。
"""


[[params.socialIcons]]
name = "github"
url = "https://github.com/enn-yaa/"


[[params.socialIcons]]
name = "email"
url = "mailto:law@xuufaa.com"



[params.assets]
favicon = "favicon.ico"



[outputs]
home = ["HTML", "RSS", "JSON"]
page = ["HTML"]



[markup.highlight]
style = "dracula"


[markup.goldmark.renderer]
unsafe = true



